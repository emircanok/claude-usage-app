name: ClaudeUsage
options:
  bundleIdPrefix: com.emircanok
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.emircanok.ClaudeUsage
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: ClaudeUsage/Info.plist
    # Developer ID signing for notarized distribution outside the Mac App Store.
    # Stable signature => no Keychain re-prompt on every rebuild. Hardened runtime is
    # mandatory for notarization; it does NOT sandbox the app, so reading Claude Code's
    # Keychain item still works.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Developer ID Application"
    DEVELOPMENT_TEAM: UNM5GHYJ72
    ENABLE_HARDENED_RUNTIME: YES
    # Stop Xcode from injecting com.apple.security.get-task-allow, which would make
    # notarization reject the build. The app needs no entitlements (no sandbox).
    CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
    # Secure timestamp is mandatory for notarization.
    OTHER_CODE_SIGN_FLAGS: "--timestamp"
    # No CODE_SIGN_ENTITLEMENTS key on purpose -> no App Sandbox.
    # Sandbox would block reading Claude Code's keychain item and complicate networking.

targets:
  ClaudeUsage:
    type: application
    platform: macOS
    sources:
      - path: ClaudeUsage
    info:
      path: ClaudeUsage/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Claude Usage
        CFBundleName: ClaudeUsage
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations: [en, tr]
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: ""
