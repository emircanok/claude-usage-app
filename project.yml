name: ClaudeUsage
options:
  bundleIdPrefix: com.emircanok
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.emircanok.ClaudeUsage
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: ClaudeUsage/Info.plist
    CODE_SIGN_STYLE: Automatic
    # No CODE_SIGN_ENTITLEMENTS key on purpose -> no App Sandbox.
    # Sandbox would block reading Claude Code's keychain item and complicate networking.

targets:
  ClaudeUsage:
    type: application
    platform: macOS
    sources:
      - path: ClaudeUsage
    info:
      path: ClaudeUsage/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Claude Usage
        CFBundleName: ClaudeUsage
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: ""
